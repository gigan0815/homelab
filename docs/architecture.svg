<svg width="100%" viewBox="0 0 680 920" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Homelab architecture diagram</title>
<desc>Network and server architecture with Proxmox host containing LXC containers including monitoring stack, UniFi network gear, and OneDrive backup</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: sans-serif; fill: #e0e0e0; }
    .th { font-size: 14px; font-weight: 500; }
    .ts { font-size: 12px; font-weight: 400; }
    .c-gray rect { fill: #444441; stroke: #5F5E5A; }
    .c-blue rect { fill: #185FA5; stroke: #378ADD; }
    .c-teal rect { fill: #0F6E56; stroke: #1D9E75; }
    .c-purple rect { fill: #534AB7; stroke: #7F77DD; }
    .c-coral rect { fill: #993C1D; stroke: #D85A30; }
    .c-green rect { fill: #3B6D11; stroke: #639922; }
  </style>
</defs>

<!-- Internet -->
<g class="c-gray">
  <rect x="270" y="20" width="140" height="36" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="38" text-anchor="middle" dominant-baseline="central">Internet</text>
</g>
<line x1="340" y1="56" x2="340" y2="76" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Network group -->
<rect x="24" y="76" width="632" height="150" rx="12" fill="none" stroke="#5F5E5A" stroke-width="1" stroke-dasharray="6 3"/>
<text class="ts" x="40" y="94" style="font-style:italic">Network · UniFi</text>

<g class="c-blue">
  <rect x="240" y="100" width="200" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="116" text-anchor="middle" dominant-baseline="central">UniFi Express 6</text>
  <text class="ts" x="340" y="132" text-anchor="middle" dominant-baseline="central">192.168.1.1 · Gateway · DHCP</text>
</g>
<line x1="340" y1="144" x2="340" y2="164" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<g class="c-teal">
  <rect x="190" y="164" width="300" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="180" text-anchor="middle" dominant-baseline="central">USW Flex Mini · HAR</text>
  <text class="ts" x="340" y="196" text-anchor="middle" dominant-baseline="central">192.168.1.4 · Main switch · Patch panel</text>
</g>

<line x1="190" y1="186" x2="144" y2="186" stroke="#888780" stroke-width="0.8" marker-end="url(#arrow)"/>
<g class="c-teal">
  <rect x="36" y="164" width="106" height="44" rx="6" stroke-width="0.5"/>
  <text class="th" x="89" y="180" text-anchor="middle" dominant-baseline="central">USW Büro</text>
  <text class="ts" x="89" y="196" text-anchor="middle" dominant-baseline="central">192.168.1.5</text>
</g>

<line x1="490" y1="186" x2="536" y2="186" stroke="#888780" stroke-width="0.8" marker-end="url(#arrow)"/>
<g class="c-purple">
  <rect x="536" y="158" width="108" height="56" rx="6" stroke-width="0.5"/>
  <text class="th" x="590" y="174" text-anchor="middle" dominant-baseline="central">APs</text>
  <text class="ts" x="590" y="190" text-anchor="middle" dominant-baseline="central">192.168.1.2</text>
  <text class="ts" x="590" y="206" text-anchor="middle" dominant-baseline="central">192.168.1.3</text>
</g>

<line x1="340" y1="208" x2="340" y2="234" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Proxmox group -->
<rect x="24" y="234" width="632" height="596" rx="12" fill="none" stroke="#BA7517" stroke-width="1.5" stroke-dasharray="6 3"/>
<text class="ts" x="40" y="252" style="font-style:italic;fill:#BA7517">Proxmox Host · ASUS PN53 · AMD Ryzen 9 5900HX · 16GB RAM · ZFS · 2× 3TB USB</text>

<!-- Media stack -->
<rect x="40" y="260" width="292" height="176" rx="8" fill="none" stroke="#444441" stroke-width="0.8" stroke-dasharray="4 3"/>
<text class="ts" x="54" y="276">Media stack</text>
<g class="c-gray"><rect x="52" y="284" width="84" height="44" rx="6" stroke-width="0.5"/>
  <text class="th" x="94" y="300" text-anchor="middle" dominant-baseline="central">sabnzbd</text>
  <text class="ts" x="94" y="314" text-anchor="middle" dominant-baseline="central">192.168.1.13</text></g>
<g class="c-gray"><rect x="148" y="284" width="84" height="44" rx="6" stroke-width="0.5"/>
  <text class="th" x="190" y="300" text-anchor="middle" dominant-baseline="central">prowlarr</text>
  <text class="ts" x="190" y="314" text-anchor="middle" dominant-baseline="central">192.168.1.14</text></g>
<g class="c-gray"><rect x="244" y="284" width="80" height="44" rx="6" stroke-width="0.5"/>
  <text class="th" x="284" y="300" text-anchor="middle" dominant-baseline="central">sonarr</text>
  <text class="ts" x="284" y="314" text-anchor="middle" dominant-baseline="central">192.168.1.15</text></g>
<g class="c-gray"><rect x="52" y="340" width="84" height="44" rx="6" stroke-width="0.5"/>
  <text class="th" x="94" y="356" text-anchor="middle" dominant-baseline="central">radarr</text>
  <text class="ts" x="94" y="370" text-anchor="middle" dominant-baseline="central">192.168.1.16</text></g>
<g class="c-gray"><rect x="148" y="340" width="84" height="44" rx="6" stroke-width="0.5"/>
  <text class="th" x="190" y="356" text-anchor="middle" dominant-baseline="central">bazarr</text>
  <text class="ts" x="190" y="370" text-anchor="middle" dominant-baseline="central">192.168.1.18</text></g>
<g class="c-gray"><rect x="244" y="340" width="80" height="44" rx="6" stroke-width="0.5"/>
  <text class="th" x="284" y="356" text-anchor="middle" dominant-baseline="central">jellyfin</text>
  <text class="ts" x="284" y="370" text-anchor="middle" dominant-baseline="central">192.168.1.17</text></g>

<!-- Documents -->
<rect x="40" y="448" width="292" height="96" rx="8" fill="none" stroke="#444441" stroke-width="0.8" stroke-dasharray="4 3"/>
<text class="ts" x="54" y="464">Documents</text>
<g class="c-coral"><rect x="52" y="472" width="168" height="44" rx="6" stroke-width="0.5"/>
  <text class="th" x="136" y="488" text-anchor="middle" dominant-baseline="central">paperless-ngx</text>
  <text class="ts" x="136" y="504" text-anchor="middle" dominant-baseline="central">192.168.1.12</text></g>

<!-- Backup -->
<rect x="40" y="556" width="292" height="60" rx="8" fill="none" stroke="#444441" stroke-width="0.8" stroke-dasharray="4 3"/>
<text class="ts" x="54" y="572">Backup</text>
<line x1="136" y1="516" x2="136" y2="580" stroke="#1D9E75" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<g class="c-teal"><rect x="52" y="576" width="168" height="32" rx="6" stroke-width="0.5"/>
  <text class="th" x="136" y="592" text-anchor="middle" dominant-baseline="central">OneDrive · daily 02:00</text></g>

<!-- Kubernetes -->
<rect x="40" y="628" width="292" height="176" rx="8" fill="none" stroke="#444441" stroke-width="0.8" stroke-dasharray="4 3"/>
<text class="ts" x="54" y="644">Kubernetes cluster · offline</text>
<g class="c-purple"><rect x="52" y="652" width="124" height="44" rx="6" stroke-width="0.5"/>
  <text class="th" x="114" y="668" text-anchor="middle" dominant-baseline="central">k8s master</text>
  <text class="ts" x="114" y="682" text-anchor="middle" dominant-baseline="central">VM 800</text></g>
<g class="c-purple"><rect x="52" y="708" width="124" height="44" rx="6" stroke-width="0.5"/>
  <text class="th" x="114" y="724" text-anchor="middle" dominant-baseline="central">k8s worker1</text>
  <text class="ts" x="114" y="738" text-anchor="middle" dominant-baseline="central">VM 801</text></g>
<g class="c-purple"><rect x="196" y="652" width="124" height="44" rx="6" stroke-width="0.5"/>
  <text class="th" x="258" y="668" text-anchor="middle" dominant-baseline="central">k8s worker2</text>
  <text class="ts" x="258" y="682" text-anchor="middle" dominant-baseline="central">VM 802</text></g>

<!-- Infrastructure -->
<rect x="356" y="260" width="284" height="96" rx="8" fill="none" stroke="#444441" stroke-width="0.8" stroke-dasharray="4 3"/>
<text class="ts" x="370" y="276">Infrastructure</text>
<g class="c-teal"><rect x="368" y="284" width="168" height="44" rx="6" stroke-width="0.5"/>
  <text class="th" x="452" y="300" text-anchor="middle" dominant-baseline="central">ansible</text>
  <text class="ts" x="452" y="314" text-anchor="middle" dominant-baseline="central">192.168.1.19</text></g>

<!-- Monitoring -->
<rect x="356" y="368" width="284" height="176" rx="8" fill="none" stroke="#444441" stroke-width="0.8" stroke-dasharray="4 3"/>
<text class="ts" x="370" y="384">Monitoring stack</text>
<g class="c-green"><rect x="368" y="392" width="124" height="44" rx="6" stroke-width="0.5"/>
  <text class="th" x="430" y="408" text-anchor="middle" dominant-baseline="central">prometheus</text>
  <text class="ts" x="430" y="422" text-anchor="middle" dominant-baseline="central">192.168.1.21</text></g>
<g class="c-green"><rect x="504" y="392" width="124" height="44" rx="6" stroke-width="0.5"/>
  <text class="th" x="566" y="408" text-anchor="middle" dominant-baseline="central">grafana</text>
  <text class="ts" x="566" y="422" text-anchor="middle" dominant-baseline="central">192.168.1.22</text></g>
<line x1="504" y1="414" x2="492" y2="414" stroke="#5F5E5A" stroke-width="0.8" marker-end="url(#arrow)"/>
<line x1="430" y1="436" x2="430" y2="480" stroke="#5F5E5A" stroke-width="0.8" stroke-dasharray="3 2"/>
<text class="ts" x="468" y="464" style="font-style:italic">scrapes :9100</text>
<rect x="356" y="480" width="284" height="44" rx="6" fill="none" stroke="#444441" stroke-width="0.5" stroke-dasharray="3 2"/>
<text class="ts" x="498" y="502" text-anchor="middle" dominant-baseline="central">node exporter · port 9100 · all containers</text>

<!-- Legend -->
<line x1="40" y1="858" x2="640" y2="858" stroke="#5F5E5A" stroke-width="0.5"/>
<g class="c-coral"><rect x="40" y="872" width="12" height="12" rx="2"/></g>
<text class="ts" x="58" y="883">Documents</text>
<g class="c-gray"><rect x="150" y="872" width="12" height="12" rx="2"/></g>
<text class="ts" x="168" y="883">Media</text>
<g class="c-teal"><rect x="220" y="872" width="12" height="12" rx="2"/></g>
<text class="ts" x="238" y="883">Infra / Backup</text>
<g class="c-green"><rect x="340" y="872" width="12" height="12" rx="2"/></g>
<text class="ts" x="358" y="883">Monitoring</text>
<g class="c-purple"><rect x="440" y="872" width="12" height="12" rx="2"/></g>
<text class="ts" x="458" y="883">Kubernetes</text>

</svg>
